<h2>Choose AR Scanner UI Style</h2>
<p class="subtitle">Which visual direction fits your vision for the app?</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Minimalist Camera</h3>
      <p>Clean, immersive. Just the camera feed and a subtle scan target.</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Glassmorphism UI</h3>
      <p>Premium frosted glass elements overlaying the camera. Shows recent scans and instructions.</p>
    </div>
  </div>
</div>
